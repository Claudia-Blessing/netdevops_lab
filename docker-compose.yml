services:

  nginx:
    image: nginx:latest
    container_name: reverse_proxy

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

    networks:
      - frontend_net
      - backend_net

  frontend:
    image: nginx:alpine
    container_name: frontend_app

    volumes:
      - ./frontend:/usr/share/nginx/html

    networks:
      - frontend_net

  backend:
    build: ./backend
    container_name: backend_api

    volumes:
      - ./backend:/app

    command: sh -c "npm install && node app.js"

    expose:
      - "3000"

    networks:
      - backend_net

    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: postgres_db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: appdb

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - backend_net

  prometheus:
    image: prom/prometheus
    container_name: prometheus_monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    networks:
      - backend_net

  grafana:
    image: grafana/grafana
    container_name: grafana_dashboard
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - backend_net

volumes:
  postgres_data:

networks:
  frontend_net:
    driver: bridge

  backend_net:
    driver: bridge